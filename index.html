<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Country Map Guess</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">World relief map</p>
          <h1>Country Map Guess</h1>
        </div>
        <button id="newRoundButton" class="icon-button" type="button" aria-label="Shuffle countries" title="Shuffle countries">
          ↻
        </button>
      </header>

      <section id="modePanel" class="mode-panel" aria-label="Choose game mode">
        <div class="mode-copy">
          <p class="eyebrow">Choose mode</p>
          <h2>How should completed countries appear?</h2>
        </div>
        <div class="mode-options">
          <label class="mode-option">
            <input type="radio" name="gameMode" value="label" checked />
            <span>
              <strong>Label mode</strong>
              <small>Keep names on countries after correct guesses.</small>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="gameMode" value="clean" />
            <span>
              <strong>Clean mode</strong>
              <small>Move on with no completed labels.</small>
            </span>
          </label>
        </div>
        <button id="startButton" type="button">Start Game</button>
      </section>

      <section class="scoreboard game-surface" aria-label="Score" hidden>
        <div><span id="correctCount">0</span><small>Correct</small></div>
        <div><span id="wrongCount">0</span><small>Wrong</small></div>
        <div><span id="skippedCount">0</span><small>Skipped</small></div>
        <div><span id="streakCount">0</span><small>Streak</small></div>
      </section>

      <section class="map-panel game-surface" aria-label="World map" hidden>
        <div class="map-tools">
          <button id="zoomOutButton" class="icon-button" type="button" aria-label="Zoom out" title="Zoom out">−</button>
          <button id="zoomResetButton" class="world-button" type="button" aria-label="Reset World View" title="Reset World View">
            World
          </button>
          <button id="zoomInButton" class="icon-button" type="button" aria-label="Zoom in" title="Zoom in">+</button>
          <button id="terrainToggleButton" class="terrain-toggle" type="button" aria-pressed="true">Terrain On/Off</button>
        </div>
        <svg
          id="worldMap"
          viewBox="0 0 1000 500"
          preserveAspectRatio="xMidYMid meet"
          role="img"
          aria-label="World map with relief terrain, rivers, and highlighted country"
        ></svg>
      </section>

      <form id="guessForm" class="guess-panel game-surface" autocomplete="off" hidden>
        <label for="guessInput">Country name</label>
        <div class="input-row">
          <input
            id="guessInput"
            name="guess"
            type="text"
            inputmode="text"
            autocapitalize="words"
            spellcheck="false"
            placeholder="Type a country..."
            aria-autocomplete="list"
            aria-controls="hintList"
          />
          <button id="submitButton" type="submit">Guess</button>
        </div>
        <div id="hintList" class="hints" role="listbox" aria-label="Country suggestions"></div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
        <div class="actions">
          <button id="skipButton" type="button">Skip</button>
          <button id="revealButton" type="button">Reveal Answer</button>
          <button id="nextButton" class="primary-action" type="button" hidden>Next</button>
          <button id="backButton" class="secondary-action" type="button">Back to Main Menu</button>
        </div>
      </form>
    </main>

    <script src="./assets/countries.js"></script>
    <script src="./assets/major-rivers.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
